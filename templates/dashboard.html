<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .header {
            background: #2a5298;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
            display: inline-block;
            width: 220px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        .danger {
            background: #ffe6e6;
            border: 1px solid red;
        }

        a {
            text-decoration: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-danger {
            background: red;
            color: white;
        }

        .btn-normal {
            background: #2a5298;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>🏢 Company Internal Dashboard</h2>
</div>

<div class="container">

    <div class="card">
        <h3>Reports</h3>
        <button class="btn-normal">View Reports</button>
    </div>

    <div class="card">
        <h3>Employee Data</h3>
        <button class="btn-normal">View Data</button>
    </div>

    <!-- 🔥 HONEYPOT TRAP (VISIBLE) -->
    <div class="card danger">
        <h3>⚠ Sensitive Data</h3>
        <a href="/confidential-data">
            <button class="btn-danger">Download Password File</button>
        </a>
    </div>

    <!-- Hidden trap -->
    <a href="/admin-panel" style="display:none;">Admin</a>

</div>

</body>
</html>
