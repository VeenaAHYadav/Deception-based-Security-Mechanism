<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 Corporate Login</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

<!-- Hidden honeypot -->
<!-- admin access: /admin-panel -->

</body>
</html>
