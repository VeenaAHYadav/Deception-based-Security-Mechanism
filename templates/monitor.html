<!DOCTYPE html>
<html>
<head>
    <title>Security Monitor</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        h2 {
            text-align: center;
            padding: 20px;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: #1e293b;
        }

        th, td {
            padding: 12px;
            border: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #334155;
        }

        .LOW { color: lightgreen; }
        .MEDIUM { color: orange; }
        .HIGH { color: red; }
        .CRITICAL { color: crimson; font-weight: bold; }

    </style>
</head>
<body>

<h2>🛡️ Security Monitoring Dashboard</h2>

<table id="logTable">
    <tr>
        <th>IP</th>
        <th>Action</th>
        <th>Severity</th>
        <th>Time</th>
    </tr>
</table>

<script>
async function loadLogs() {
    const res = await fetch("/dashboard-data");
    const data = await res.json();

    let table = `
        <tr>
            <th>IP</th>
            <th>Action</th>
            <th>Severity</th>
            <th>Time</th>
        </tr>
    `;

    data.reverse().forEach(log => {
        table += `
            <tr>
                <td>${log.ip}</td>
                <td>${log.action}</td>
                <td class="${log.severity}">${log.severity}</td>
                <td>${log.timestamp}</td>
            </tr>
        `;
    });

    document.getElementById("logTable").innerHTML = table;
}

// Refresh every 3 seconds
setInterval(loadLogs, 3000);
loadLogs();
</script>

</body>
</html>
